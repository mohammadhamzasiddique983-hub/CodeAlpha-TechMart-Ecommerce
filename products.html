<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - TechMart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <h1>TechMart</h1>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="cart.html">Cart</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>

    <section class="hero">
        <h2>Our Products</h2>
        <p>Choose Your Favorite Product</p>
    </section>

    <section class="products">

        <div class="card">
            <img src="images/watch.jpeg" alt="">
            <h3>Watch</h3>
            <p>₹1999</p>
            <button onclick="addToCart('Watch')">Add To Cart</button>
        </div>

        <div class="card">
            <img src="images/headphones.jpeg" alt="">
            <h3>Headphones</h3>
            <p>₹1499</p>
            <button onclick="addToCart('Headphones')">Add To Cart</button>
        </div>

        <div class="card">
            <img src="images/mouse.jpeg" alt="">
            <h3>Wireless Mouse</h3>
            <p>₹799</p>
            <button onclick="addToCart('Wireless Mouse')">Add To Cart</button>
        </div>

        <div class="card">
            <img src="images/keyboard.jpeg" alt="">
            <h3>Keyboard</h3>
            <p>₹999</p>
            <button onclick="addToCart('Keyboard')">Add To Cart</button>
        </div>

        <div class="card">
            <img src="images/bluetooth-speaker.jpeg" alt="">
            <h3>Bluetooth Speaker</h3>
            <p>₹1299</p>
            <button onclick="addToCart('Bluetooth Speaker')">Add To Cart</button>
        </div>

        <div class="card">
            <img src="images/Gaming-mouse.jpeg" alt="">
            <h3>Gaming Mouse</h3>
            <p>₹1599</p>
            <button onclick="addToCart('Gaming-mouse')">Add To Cart</button>
        </div>

    </section>
      <script src="script.js"></script>
</body>
</html>
